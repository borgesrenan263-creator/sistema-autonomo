services:
  - type: web
    name: sistema-autonomo-web
    env: ruby
    plan: starter
    buildCommand: bundle install && ruby scripts/production_setup.rb
    startCommand: bundle exec ruby app.rb
    envVars:
      - key: RACK_ENV
        value: production
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sistema-autonomo-db
          property: connectionString

  - type: worker
    name: sistema-autonomo-worker
    env: ruby
    plan: starter
    buildCommand: bundle install && ruby scripts/production_setup.rb
    startCommand: bundle exec ruby workers/job_worker.rb
    envVars:
      - key: RACK_ENV
        value: production
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sistema-autonomo-db
          property: connectionString

databases:
  - name: sistema-autonomo-db
    plan: starter
