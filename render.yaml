services:
  - type: web
    name: sistema-autonomo-web
    runtime: ruby
    plan: starter
    buildCommand: bin/render_setup
    startCommand: bundle exec ruby app.rb
    healthCheckPath: /uptime
    disk:
      name: sistema-autonomo-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: APP_ENV
        value: production
      - key: RACK_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: CHANNEL_DISPATCH_ENABLED
        value: "false"
      - key: CHANNEL_DAILY_LIMIT
        value: "10"
      - key: AUTOPILOT_DAILY_LOOP_INTERVAL_MINUTES
        value: "30"
      - key: JOB_WORKER_INTERVAL_SECONDS
        value: "60"
      - key: STALE_DEAL_DAYS
        value: "7"
      - key: JOB_QUEUE_BASE_URL
        value: https://sistema-autonomo-web.onrender.com

  - type: worker
    name: sistema-autonomo-worker
    runtime: ruby
    plan: starter
    buildCommand: bin/render_setup
    startCommand: bundle exec ruby workers/job_worker.rb
    disk:
      name: sistema-autonomo-worker-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: APP_ENV
        value: production
      - key: RACK_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: CHANNEL_DISPATCH_ENABLED
        value: "false"
      - key: CHANNEL_DAILY_LIMIT
        value: "10"
      - key: AUTOPILOT_DAILY_LOOP_INTERVAL_MINUTES
        value: "30"
      - key: JOB_WORKER_INTERVAL_SECONDS
        value: "60"
      - key: STALE_DEAL_DAYS
        value: "7"
      - key: JOB_QUEUE_BASE_URL
        value: https://sistema-autonomo-web.onrender.com
